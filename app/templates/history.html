{% extends 'base.html' %}
{% block content %}
<section class="max-w-3xl mx-auto px-4 py-10">
  <h2 class="text-2xl font-semibold mb-4">Histórico de Transcrições</h2>
<ul class="space-y-2">
  {%- for f in files %}
    <li class="flex items-center justify-between bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-3">
      <span>{{ f.name }}</span>
      <a href="/download/{{ f.name }}" class="text-sm underline">baixar</a>
    </li>
  {%- else %}
    <li class="text-gray-500">Nenhuma transcrição encontrada.</li>
  {%- endfor %}
</ul>
</section>
{% endblock %}
